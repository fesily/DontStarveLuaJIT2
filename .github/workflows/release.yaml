name: build

permissions:
  contents: write

on:
  push:
    branches:
      - master
    tags:
      - "*"
  pull_request:
    branches:
      - master

jobs:
  compile:
    env:
      VCPKG_DEFAULT_BINARY_CACHE: ${{ github.workspace }}/.vcpkg-bincache
      VCPKG_BINARY_SOURCES: clear;files,${{ github.workspace }}/.vcpkg-bincache,readwrite
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: windows-2022, target: windows, platform: win32-x64 }
          - { os: ubuntu-24.04,   target: linux,   platform: linux-x64 }
          - { os: macos-14,       target: macos,   platform: macos-x64 }
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true
      - name: Restore vcpkg binary cache
        id: vcpkg-cache
        uses: actions/cache/restore@v4
        with:
          path: ${{ github.workspace }}/.vcpkg-bincache
          key: ${{ runner.os }}-vcpkg-${{ hashFiles('vcpkg.json', 'vcpkg-configuration.json', 'CMakeLists.txt', 'cmake/custom-triplets/**', 'cmake/ports/**') }}
      - name: Initialize MSVC developer environment
        if: ${{ matrix.target == 'windows' }}
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: amd64
      - uses: lukka/get-cmake@latest
        with:
          cmakeVersion: 3.31.6     # <--= optional, stick to exactly 3.25.2 version
          ninjaVersion: 1.11.1     # <--= optional, stick to exactly 1.11.1 version
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13' 
      - name: Restore from cache and setup vcpkg executable and data files.
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgJsonGlob: 'vcpkg.json'

      - name: Configure CMake and populate vcpkg binary cache
        uses: lukka/run-cmake@v10
        with:
          configurePreset: 'ninja-multi-vcpkg'
          configurePresetAdditionalArgs: "['-DCMAKE_OSX_ARCHITECTURES=x86_64']"

      - name: Save vcpkg binary cache
        if: ${{ always() && steps.vcpkg-cache.outputs.cache-hit != 'true' }}
        uses: actions/cache/save@v4
        with:
          path: ${{ github.workspace }}/.vcpkg-bincache
          key: ${{ steps.vcpkg-cache.outputs.cache-primary-key }}

      - name: Build
        run: |
          cmake --build ./builds/ninja-multi-vcpkg --config RelWithDebInfo

      - name: CMake install
        run: |
          cmake --build ./builds/ninja-multi-vcpkg --config RelWithDebInfo --target install

      - name: Clean Up linux
        if: ${{ matrix.target == 'linux' }}
        run: |
          rm -rf ${{ github.workspace }}/Mod/bin64/windows
          rm -rf ${{ github.workspace }}/Mod/bin64/osx

      - name: Clean Up windows
        if: ${{ matrix.target == 'windows' }}
        run: |
          rm -r ${{ github.workspace }}/Mod/bin64/osx
          rm -r ${{ github.workspace }}/Mod/bin64/linux

      - name: Clean Up macos
        if: ${{ matrix.target == 'macos' }}
        run: |
          rm -rf ${{ github.workspace }}/Mod/bin64/windows
          rm -r ${{ github.workspace }}/Mod/bin64/linux

      - name: Archive Release
        uses: thedoctor0/zip-release@0.7.5
        with:
          path: ./Mod
          filename: ${{ matrix.target }}_Mod.zip
          directory: ${{ github.workspace }}

      - name: Upload packaged mod
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}-mod-zip
          path: ${{ github.workspace }}/${{ matrix.target }}_Mod.zip
          if-no-files-found: error

  publish-release:
    needs: compile
    if: startsWith(github.ref, 'refs/tags/') && !startsWith(github.ref, 'refs/tags/preview-')
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: windows-2022, target: windows, platform: win32-x64 }
          - { os: ubuntu-24.04,   target: linux,   platform: linux-x64 }
          - { os: macos-14,       target: macos,   platform: macos-x64 }
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Download packaged mod
        uses: actions/download-artifact@v4
        with:
          name: ${{ matrix.target }}-mod-zip
          path: ${{ github.workspace }}

      - name: Publish release assets
        uses: ncipollo/release-action@v1.14.0
        with:
          artifacts: ${{ github.workspace }}/${{ matrix.target }}_Mod.zip
          allowUpdates: true

  publish-preview:
    needs: compile
    if: ${{ github.ref == 'refs/heads/master' }}
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read project version
        id: project-version
        run: |
          version=$(grep -oP 'project\([^)]*VERSION\s+\K[0-9]+\.[0-9]+\.[0-9]+' CMakeLists.txt)
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Download packaged mods
        uses: actions/download-artifact@v4
        with:
          path: ${{ github.workspace }}/artifacts

      - name: Publish preview release
        uses: ncipollo/release-action@v1.14.0
        with:
          artifacts: ${{ github.workspace }}/artifacts/*/*_Mod.zip
          allowUpdates: true
          prerelease: true
          makeLatest: false
          tag: preview-${{ github.run_id }}
          name: Preview v${{ steps.project-version.outputs.version }}
          commit: ${{ github.sha }}
